# ============================================================================
# 🐧 Build Arch Linux ARM RootFS for Xiaomi Pad 6s Pro (Sheng)
# ============================================================================

name: Build RootFS (Arch)

on:
  workflow_dispatch:
    inputs:
      arch_mirror:
        description: 'Arch Linux ARM mirror'
        type: string
        required: false
        default: 'http://mirror.archlinuxarm.org'

      desktop:
        description: 'Desktop Environment (server = no DE)'
        type: choice
        options:
          - GNOME
          - KDE Plasma
          - server
        default: 'KDE Plasma'

      plasma_mobile:
        description: 'Enable Plasma Mobile instead of Plasma Desktop'
        type: boolean
        default: false

      autologin:
        description: 'Autologin'
        type: boolean
        default: true

      username:
        description: 'Username'
        type: string
        default: 'username'

      hostname:
        description: 'Hostname'
        type: string
        default: 'xiaomi-sheng'

      boot_mode:
        description: |
          Boot mode:
          - single: Boot from partition "userdata"
          - dual: Boot from partition "linux"
          - custom: Boot from custom partition (No prebuilt kernel available)
        type: choice
        options:
          - 'single (userdata)'
          - 'dual (linux)'
          - 'custom'
        default: 'dual (linux)'

      quiet_boot:
        description: 'Enable quiet boot with Plymouth splash'
        type: boolean
        default: true

      custom_partition:
        description: 'Custom partition (required when boot_mode=custom)'
        type: string
        required: false
        default: ''

      kernel_source:
        description: |
          Kernel Source:
          - prebuilt: ianchb/sm8550-mainline
          - custom_build: Custom repo
        type: choice
        options:
          - 'prebuilt'
          - 'custom_build'
        default: 'prebuilt'

      kernel_repo:
        description: 'Kernel Repo URL (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'https://github.com/ianchb/sm8550-mainline'

      kernel_branch:
        description: 'Kernel Branch (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'sheng-7.1.4'

      kernel_config:
        description: 'Kernel Config (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'sm8550.config'

      firmware_repo:
        description: 'Firmware Repo URL'
        type: string
        required: false
        default: 'https://github.com/ianchb/sheng-firmware'

      firmware_branch:
        description: 'Firmware Branch'
        type: string
        required: false
        default: 'master'

# ============================================================================
# Build Jobs — each produces an archive (tar.gz), uploaded as artifact
# ============================================================================

jobs:
  # ==========================================================================
  # Kernel (conditional on custom_build) – unchanged except packaging
  # ==========================================================================
  build-kernel:
    name: "Build Kernel"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Skip (Prebuilt Kernel)"
        if: ${{ inputs.kernel_source != 'custom_build' }}
        run: echo "✓ Using prebuilt kernel, build skipped"

      - name: "Checkout Repo"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/checkout@v7

      - name: "Install Build Tools"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential flex bison libssl-dev libelf-dev bc \
            ccache clang llvm lld
          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros
          echo "✓ Build tools installed"

      - name: "Restore ccache"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/cache@v6
        with:
          path: /home/runner/.ccache
          key: ccache-kernel-${{ inputs.kernel_branch }}-${{ inputs.kernel_config }}-${{ hashFiles(inputs.kernel_config) }}
          restore-keys: |
            ccache-kernel-${{ inputs.kernel_branch }}-${{ inputs.kernel_config }}-
            ccache-kernel-${{ inputs.kernel_branch }}-
            ccache-kernel-

      - name: "Clone Kernel Repo"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          git clone "${{ inputs.kernel_repo }}" \
            --branch "${{ inputs.kernel_branch }}" \
            --depth 1 \
            linux
          echo "✓ Kernel repo cloned"

      - name: "Build Kernel"
        id: build
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          export CC="ccache clang"
          export CXX="ccache clang++"
          export AR="llvm-ar"
          export NM="llvm-nm"
          export OBJCOPY="llvm-objcopy"
          export OBJDUMP="llvm-objdump"
          export READELF="llvm-readelf"
          export STRIP="llvm-strip"

          cp "${{ github.workspace }}/${{ inputs.kernel_config }}" linux/.config
          cd linux

          make -j$(nproc) ARCH=arm64 LLVM=1

          KVER="$(make kernelrelease -s)"
          echo "kernel_version=$KVER" >> $GITHUB_OUTPUT
          echo "  Kernel version: $KVER"

          make -j$(nproc) ARCH=arm64 LLVM=1 \
            INSTALL_MOD_PATH="${{ github.workspace }}/linux-xiaomi-sheng" \
            modules_install
          rm -rf "${{ github.workspace }}/linux-xiaomi-sheng/lib/modules/"*"/build" || true

          mkdir -p "${{ github.workspace }}/linux-xiaomi-sheng/boot"
          install -Dm644 arch/arm64/boot/Image.gz \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/Image.gz"
          install -Dm644 arch/arm64/boot/dts/qcom/sm8550-xiaomi-sheng.dtb \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/sm8550-xiaomi-sheng.dtb"
          install -Dm644 .config \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/config-${KVER}"
          install -Dm644 System.map \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/System.map-${KVER}"

          cat arch/arm64/boot/Image.gz \
              arch/arm64/boot/dts/qcom/sm8550-xiaomi-sheng.dtb \
            > "${{ github.workspace }}/Image.gz-dtb_sheng"

          cd "${{ github.workspace }}"
          ccache --show-stats --verbose | grep -E "(hit rate|cache hit|cache miss|max size)" || true
          echo "✓ Kernel build complete"

      - name: "Package Kernel as tar.gz"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          KVER="${{ steps.build.outputs.kernel_version }}"
          cd "${{ github.workspace }}"
          tar czf linux-xiaomi-sheng-${KVER}.tar.gz linux-xiaomi-sheng
          echo "✓ linux-xiaomi-sheng-${KVER}.tar.gz packaged"

      - name: "Upload Kernel Package"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/upload-artifact@v7
        with:
          name: kernel-custom-pkg
          path: linux-xiaomi-sheng-*.tar.gz
          retention-days: 3
          if-no-files-found: error

      - name: "Upload Kernel Image"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/upload-artifact@v7
        with:
          name: kernel-custom-image
          path: Image.gz-dtb_sheng
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # fastrpc – Qualcomm FastRPC userspace (archive instead of deb)
  # ==========================================================================
  build-fastrpc:
    name: "Build fastrpc"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v7

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            git wget unzip libyaml-dev linux-libc-dev
          echo "✓ Build tools installed"

      - name: "Download Source"
        run: |
          wget -q https://github.com/qualcomm/fastrpc/archive/refs/tags/v1.0.2.zip
          unzip -q v1.0.2.zip
          echo "✓ Source downloaded"

      - name: "Build fastrpc"
        run: |
          cd fastrpc-1.0.2
          autoreconf -is
          ./configure --prefix=/usr
          make -j$(nproc)
          mkdir -p stage
          make DESTDIR=$PWD/stage install
          echo "✓ fastrpc built"

      - name: "Add systemd Service"
        run: |
          mkdir -p fastrpc-1.0.2/stage/usr/lib/systemd/system
          cp patches/adsprpcd-sensorspd.service fastrpc-1.0.2/stage/usr/lib/systemd/system/
          echo "✓ systemd service added"

      - name: "Package fastrpc as tar.gz"
        run: |
          cd fastrpc-1.0.2
          tar czf fastrpc.tar.gz -C stage usr
          mv fastrpc.tar.gz "${{ github.workspace }}/"
          echo "✓ fastrpc.tar.gz created"

      - name: "Upload fastrpc"
        uses: actions/upload-artifact@v7
        with:
          name: fastrpc-pkg
          path: fastrpc.tar.gz
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # libssc – Qualcomm Sensor Core userspace (archive)
  # ==========================================================================
  build-libssc:
    name: "Build libssc"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v7

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build git pkg-config python3-pip \
            libglib2.0-dev libprotobuf-c-dev libqmi-glib-dev libmbim-glib-dev \
            linux-libc-dev protobuf-compiler protobuf-c-compiler
          pip3 install --upgrade meson
          echo "✓ Build tools installed"

      - name: "Clone Source"
        run: |
          git clone https://codeberg.org/DylanVanAssche/libssc.git source
          echo "✓ Source cloned"

      - name: "Apply Patch"
        run: |
          cd source
          cp "${{ github.workspace }}/patches/wait_for_qmi_service.patch" .
          patch -Np1 < wait_for_qmi_service.patch || true
          echo "✓ Patch applied"

      - name: "Build libssc"
        run: |
          cd source
          meson setup build --prefix=/usr
          meson compile -C build
          DESTDIR=$PWD/stage meson install -C build
          echo "✓ libssc built"

      - name: "Package libssc as tar.gz"
        run: |
          cd source
          tar czf libssc.tar.gz -C stage usr
          mv libssc.tar.gz "${{ github.workspace }}/"
          echo "✓ libssc.tar.gz created"

      - name: "Upload libssc"
        uses: actions/upload-artifact@v7
        with:
          name: libssc-pkg
          path: libssc.tar.gz
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # iio-sensor-proxy – patched with Qualcomm SSC support (needs libssc)
  # ==========================================================================
  build-iio-sensor-proxy:
    name: "Build iio-sensor-proxy"
    runs-on: ubuntu-24.04-arm
    needs: [build-libssc]

    steps:
      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config git wget \
            python3-pip libglib2.0-dev libgudev-1.0-dev \
            libpolkit-gobject-1-dev libsystemd-dev libdbus-1-dev \
            systemd libqmi-glib-dev libmbim-glib-dev \
            linux-libc-dev protobuf-compiler protobuf-c-compiler
          pip3 install --upgrade meson
          echo "✓ Build tools installed"

      - name: "Download libssc"
        uses: actions/download-artifact@v8
        with:
          name: libssc-pkg

      - name: "Install libssc from tar.gz"
        run: |
          sudo tar xf libssc.tar.gz -C /usr/local
          sudo ldconfig
          echo "✓ libssc installed"

      - name: "Download Source"
        run: |
          wget -q https://gitlab.freedesktop.org/hadess/iio-sensor-proxy/-/archive/3.9/iio-sensor-proxy-3.9.tar.gz
          tar -xf iio-sensor-proxy-3.9.tar.gz
          echo "✓ Source downloaded"

      - name: "Build iio-sensor-proxy"
        run: |
          cd iio-sensor-proxy-3.9
          meson setup output \
            --prefix=/usr \
            -Db_lto=true \
            -Dssc-support=enabled \
            -Dsystemdsystemunitdir=/usr/lib/systemd/system
          meson compile -C output
          DESTDIR=$PWD/stage meson install --no-rebuild -C output
          echo "✓ iio-sensor-proxy built"

      - name: "Package iio-sensor-proxy as tar.gz"
        run: |
          cd iio-sensor-proxy-3.9
          tar czf iio-sensor-proxy.tar.gz -C stage usr
          mv iio-sensor-proxy.tar.gz "${{ github.workspace }}/"
          echo "✓ iio-sensor-proxy.tar.gz created"

      - name: "Upload iio-sensor-proxy"
        uses: actions/upload-artifact@v7
        with:
          name: iio-sensor-proxy-pkg
          path: iio-sensor-proxy.tar.gz
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # sheng-sensors – proprietary sensor config files (archive)
  # ==========================================================================
  build-sheng-sensors:
    name: "Build sheng-sensors"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v7

      - name: "Package sheng-sensors as tar.gz"
        run: |
          if [ -d sheng-sensors-files/usr ]; then
            tar czf sheng-sensors.tar.gz -C sheng-sensors-files usr
          else
            echo "Error: sheng-sensors-files/usr not found"
            exit 1
          fi
          echo "✓ sheng-sensors.tar.gz created"

      - name: "Upload sheng-sensors"
        uses: actions/upload-artifact@v7
        with:
          name: sheng-sensors-pkg
          path: sheng-sensors.tar.gz
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # sheng-devauth – keyboard authentication daemon (archive)
  # ==========================================================================
  build-sheng-devauth:
    name: "Build sheng-devauth"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v7

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git
          echo "✓ Build tools installed"

      - name: "Clone Source"
        run: |
          git clone https://github.com/ianchb/sheng_devauth.git source
          echo "✓ Source cloned"

      - name: "Build Binary"
        run: |
          cd source
          make
          echo "✓ Binary built"

      - name: "Package sheng-devauth as tar.gz"
        run: |
          mkdir -p pkg/usr/bin
          chmod 0755 source/xiaomi_devauth
          cp source/xiaomi_devauth pkg/usr/bin/
          tar czf sheng-devauth.tar.gz -C pkg usr
          echo "✓ sheng-devauth.tar.gz created"

      - name: "Upload sheng-devauth"
        uses: actions/upload-artifact@v7
        with:
          name: sheng-devauth-pkg
          path: sheng-devauth.tar.gz
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # RootFS Assembly – pacstrap + custom archives
  # ==========================================================================
  build-rootfs:
    name: "Build Arch RootFS"
    runs-on: ubuntu-24.04-arm
    needs:
      - build-kernel
      - build-fastrpc
      - build-libssc
      - build-iio-sensor-proxy
      - build-sheng-sensors
      - build-sheng-devauth
    permissions:
      contents: read
      packages: read

    env:
      ROOTFS_MOUNT: /mnt/rootfs
      IMAGE_SIZE: 10G

    steps:
      # ----------------------------------------------------------------
      # Checkout & Validate
      # ----------------------------------------------------------------
      - name: "Checkout Repo"
        uses: actions/checkout@v7

      - name: "Verify Arguments"
        env:
          ROOTFS_PASSWORD: ${{ secrets.ROOTFS_PASSWORD }}
        run: |
          if [[ -z "$ROOTFS_PASSWORD" ]]; then
            echo "::warning::ROOTFS_PASSWORD is not set; the image will use the default password 'password'."
          fi
          if [[ "${{ inputs.boot_mode }}" == "custom" ]]; then
            if [[ "${{ inputs.kernel_source }}" != "custom_build" ]]; then
              echo "Error: Custom partition requires custom_build kernel"
              exit 1
            fi
            if [[ -z "${{ inputs.custom_partition }}" ]]; then
              echo "Error: custom_partition is required when boot_mode=custom"
              exit 1
            fi
          fi
          echo "✓ Arguments verified"

      - name: "Parse Partition Label"
        id: partition
        run: |
          if [[ "${{ inputs.quiet_boot }}" == "true" && "${{ inputs.desktop }}" != "server" ]]; then
            QUIET_BOOT=true
          else
            QUIET_BOOT=false
          fi
          echo "quiet_boot_enabled=$QUIET_BOOT" >> $GITHUB_OUTPUT

          case "${{ inputs.boot_mode }}" in
            'single (userdata)')
              echo "label=userdata" >> $GITHUB_OUTPUT
              if [[ "$QUIET_BOOT" == "true" ]]; then
                echo "boot_img_pattern=boot_sheng_singleboot_plymouth.img" >> $GITHUB_OUTPUT
              else
                echo "boot_img_pattern=boot_sheng_singleboot.img" >> $GITHUB_OUTPUT
              fi
              ;;
            'dual (linux)')
              echo "label=linux" >> $GITHUB_OUTPUT
              if [[ "$QUIET_BOOT" == "true" ]]; then
                echo "boot_img_pattern=boot_sheng_dualboot_plymouth.img" >> $GITHUB_OUTPUT
              else
                echo "boot_img_pattern=boot_sheng_dualboot.img" >> $GITHUB_OUTPUT
              fi
              ;;
            'custom')
              echo "label=${{ inputs.custom_partition }}" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "✓ Partition label set"

      # ----------------------------------------------------------------
      # Install host tools (docker + dpkg for deb extraction)
      # ----------------------------------------------------------------
      - name: "Install Host Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io git curl dpkg-dev
          sudo systemctl start docker
          sudo docker pull archlinux:latest
          echo "✓ Docker ready"

      # ----------------------------------------------------------------
      # Acquire Kernel
      # ----------------------------------------------------------------
      - name: "[Prebuilt] Download Kernel"
        if: ${{ inputs.kernel_source != 'custom_build' }}
        run: |
          LATEST_TAG=$(gh release list --repo ianchb/sm8550-mainline --limit 1 --json tagName -q '.[0].tagName')
          echo "  Latest tag: $LATEST_TAG"
          BOOT_PATTERN="${{ steps.partition.outputs.boot_img_pattern }}"
          gh release download "$LATEST_TAG" \
            --repo ianchb/sm8550-mainline \
            --pattern "$BOOT_PATTERN" \
            --clobber
          mv "$BOOT_PATTERN" boot.img
          gh release download "$LATEST_TAG" \
            --repo ianchb/sm8550-mainline \
            --pattern "linux-xiaomi-sheng*.deb" \
            --clobber
          # extract deb for later use
          mkdir -p kernel-deb
          dpkg-deb -x linux-xiaomi-sheng*.deb kernel-deb/
          echo "✓ Prebuilt kernel downloaded & extracted"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[Custom] Download Kernel Package"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/download-artifact@v8
        with:
          name: kernel-custom-pkg

      - name: "[Custom] Download Kernel Image"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/download-artifact@v8
        with:
          name: kernel-custom-image

      # ----------------------------------------------------------------
      # Download build artifacts (tar.gz)
      # ----------------------------------------------------------------
      - name: "Download fastrpc"
        uses: actions/download-artifact@v8
        with:
          name: fastrpc-pkg

      - name: "Download libssc"
        uses: actions/download-artifact@v8
        with:
          name: libssc-pkg

      - name: "Download iio-sensor-proxy"
        uses: actions/download-artifact@v8
        with:
          name: iio-sensor-proxy-pkg

      - name: "Download sheng-sensors"
        uses: actions/download-artifact@v8
        with:
          name: sheng-sensors-pkg

      - name: "Download sheng-devauth"
        uses: actions/download-artifact@v8
        with:
          name: sheng-devauth-pkg

      # ----------------------------------------------------------------
      # Prepare additional packages (firmware, alsa, external debs)
      # ----------------------------------------------------------------
      - name: "Prepare firmware-xiaomi-sheng archive"
        run: |
          git clone --depth 1 \
            --branch "${{ inputs.firmware_branch }}" \
            "${{ inputs.firmware_repo }}" \
            firmware-src
          mkdir -p firmware-pkg/usr/lib/firmware
          cp -r firmware-src/* firmware-pkg/usr/lib/firmware/
          rm -rf firmware-src
          tar czf firmware-xiaomi-sheng.tar.gz -C firmware-pkg usr
          echo "✓ firmware-xiaomi-sheng.tar.gz created"

      - name: "Prepare alsa-xiaomi-sheng archive"
        run: |
          if [ -d alsa-xiaomi-sheng ]; then
            tar czf alsa-xiaomi-sheng.tar.gz -C alsa-xiaomi-sheng .
          else
            echo "Warning: alsa-xiaomi-sheng directory not found, skipping"
            tar czf alsa-xiaomi-sheng.tar.gz --files-from /dev/null
          fi
          echo "✓ alsa-xiaomi-sheng.tar.gz prepared"

      - name: "Download & extract external debs"
        run: |
          mkdir -p external-debs
          # Helper to download a deb from latest release
          download_deb() {
            REPO=$1
            LATEST=$(gh release list --repo "$REPO" --limit 1 --json tagName -q '.[0].tagName')
            gh release download "$LATEST" --repo "$REPO" --pattern "*.deb" --dir external-debs --clobber
          }
          download_deb ianchb/xiaomi-mipps-auth
          download_deb ianchb/xiaomi-charger-mode
          download_deb ianchb/xiaomi-sheng-thp
          download_deb ianchb/xiaomi-pen-status
          download_deb ianchb/xiaomi-sheng-fingerprint
          download_deb ianchb/xiaomi-sheng-keyboard-helper
          # Extract all debs into a single directory tree
          mkdir -p external-root
          for deb in external-debs/*.deb; do
            dpkg-deb -x "$deb" external-root/
          done
          tar czf external-packages.tar.gz -C external-root .
          echo "✓ External packages extracted and archived"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Create & mount image
      # ----------------------------------------------------------------
      - name: "Create RootFS Image"
        run: |
          truncate -s "$IMAGE_SIZE" rootfs.img
          mkfs.ext4 rootfs.img
          echo "✓ RootFS image created (${IMAGE_SIZE})"

      - name: "Mount RootFS Image"
        run: |
          sudo mkdir -p "$ROOTFS_MOUNT"
          sudo mount -o loop rootfs.img "$ROOTFS_MOUNT"
          echo "✓ RootFS image mounted at $ROOTFS_MOUNT"

      # ----------------------------------------------------------------
      # Bootstrap Arch Linux ARM in Docker
      # ----------------------------------------------------------------
      - name: "Bootstrap Arch Linux ARM"
        run: |
          sudo docker run --rm --privileged \
            -v "$ROOTFS_MOUNT":/mnt \
            archlinux:latest \
            bash -c "
              pacman-key --init
              pacman-key --populate archlinux
              pacstrap -c /mnt base base-devel sudo vim wget curl \
                networkmanager openssh wpa_supplicant dbus \
                ca-certificates chrony iw lm_sensors wireless-regdb \
                net-tools glib2 protobuf-c libqmi libmbim libyaml \
                libgudev polkit
            "
          echo "✓ Pacstrap complete"

      # ----------------------------------------------------------------
      # Chroot configuration helper
      # ----------------------------------------------------------------
      - name: "Run chroot configuration"
        run: |
          # This step runs inside the arch container to configure the system
          sudo docker run --rm --privileged \
            -v "$ROOTFS_MOUNT":/mnt \
            -e HOSTNAME="${{ inputs.hostname }}" \
            -e USERNAME="${{ inputs.username }}" \
            -e ROOTFS_PASSWORD="${{ secrets.ROOTFS_PASSWORD }}" \
            -e DESKTOP="${{ inputs.desktop }}" \
            -e PLASMA_MOBILE="${{ inputs.plasma_mobile }}" \
            -e AUTOLOGIN="${{ inputs.autologin }}" \
            -e QUIET_BOOT="${{ steps.partition.outputs.quiet_boot_enabled }}" \
            archlinux:latest \
            bash -c '
              set -e
              echo "==> Basic configuration"
              echo "$HOSTNAME" > /mnt/etc/hostname
              grep -q "127.0.1.1.*$HOSTNAME" /mnt/etc/hosts || \
                echo "127.0.1.1 $HOSTNAME" >> /mnt/etc/hosts

              arch-chroot /mnt useradd -m -s /bin/bash -G wheel "$USERNAME"
              if [[ -z "$ROOTFS_PASSWORD" ]]; then
                ROOTFS_PASSWORD="password"
              fi
              printf "%s:%s\n" "$USERNAME" "$ROOTFS_PASSWORD" | arch-chroot /mnt chpasswd
              printf "root:%s\n" "$ROOTFS_PASSWORD" | arch-chroot /mnt chpasswd

              echo "==> Enable base services"
              arch-chroot /mnt systemctl enable NetworkManager
              arch-chroot /mnt systemctl enable sshd
              arch-chroot /mnt systemctl enable chronyd

              if [[ "$QUIET_BOOT" == "true" ]]; then
                arch-chroot /mnt pacman -S --noconfirm plymouth
              fi

              echo "==> Desktop environment"
              if [[ "$DESKTOP" == "GNOME" ]]; then
                arch-chroot /mnt pacman -S --noconfirm gnome gnome-extra firefox
                if [[ "$AUTOLOGIN" == "true" ]]; then
                  mkdir -p /mnt/etc/gdm
                  cat > /mnt/etc/gdm/custom.conf << EOF
[daemon]
AutomaticLoginEnable=True
AutomaticLogin=$USERNAME
EOF
                fi
                arch-chroot /mnt systemctl enable gdm
              elif [[ "$DESKTOP" == "KDE Plasma" ]]; then
                if [[ "$PLASMA_MOBILE" == "true" ]]; then
                  arch-chroot /mnt pacman -S --noconfirm plasma-mobile
                else
                  arch-chroot /mnt pacman -S --noconfirm plasma plasma-nm sddm konsole firefox dolphin kate
                fi
                if [[ "$QUIET_BOOT" == "true" ]]; then
                  arch-chroot /mnt pacman -S --noconfirm plymouth-kcm breeze-plymouth
                fi
                if [[ "$AUTOLOGIN" == "true" ]]; then
                  mkdir -p /mnt/etc/sddm.conf.d
                  cat > /mnt/etc/sddm.conf.d/autologin.conf << EOF
[Autologin]
User=$USERNAME
Session=plasma
EOF
                fi
                arch-chroot /mnt systemctl enable sddm
              fi
              arch-chroot /mnt systemctl set-default graphical.target

              # Enable sudo for wheel group
              sed -i "s/^# %wheel ALL=(ALL:ALL) ALL/%wheel ALL=(ALL:ALL) ALL/" /mnt/etc/sudoers
            '

      # ----------------------------------------------------------------
      # Install custom and external packages
      # ----------------------------------------------------------------
      - name: "Install custom packages (tar.gz)"
        run: |
          sudo mkdir -p "$ROOTFS_MOUNT/tmp/pkgs"
          # Copy all custom archives
          sudo cp fastrpc.tar.gz libssc.tar.gz iio-sensor-proxy.tar.gz \
            sheng-sensors.tar.gz sheng-devauth.tar.gz \
            alsa-xiaomi-sheng.tar.gz firmware-xiaomi-sheng.tar.gz \
            external-packages.tar.gz "$ROOTFS_MOUNT/tmp/pkgs/"
          # Copy kernel if built custom
          if [ -f linux-xiaomi-sheng-*.tar.gz ]; then
            sudo cp linux-xiaomi-sheng-*.tar.gz "$ROOTFS_MOUNT/tmp/pkgs/"
          elif [ -d kernel-deb ]; then
            # prebuilt kernel already extracted, archive it
            sudo tar czf "$ROOTFS_MOUNT/tmp/pkgs/kernel.tar.gz" -C kernel-deb .
          fi

          # Install all archives inside arch chroot
          sudo docker run --rm --privileged \
            -v "$ROOTFS_MOUNT":/mnt \
            archlinux:latest \
            bash -c '
              set -e
              cd /mnt/tmp/pkgs
              for pkg in *.tar.gz; do
                echo "  Extracting $pkg"
                tar xzf "$pkg" -C /mnt/
              done
              # Fix permissions
              chmod +x /mnt/usr/bin/adsprpcd || true
              chmod +x /mnt/usr/libexec/iio-sensor-proxy || true
              chmod +x /mnt/usr/bin/monitor-sensor || true
              chmod +x /mnt/usr/bin/ssccli || true
              # Enable services
              arch-chroot /mnt systemctl enable adsprpcd-sensorspd.service || true
              # Create sheng-devauth service if not present
              if [ -f /mnt/usr/bin/xiaomi_devauth ] && [ ! -f /mnt/usr/lib/systemd/system/sheng-devauth.service ]; then
                cat > /mnt/usr/lib/systemd/system/sheng-devauth.service << EOF
[Unit]
Description=Keyboard authentication daemon
After=multi-user.target

[Service]
Type=simple
ExecStart=/usr/bin/xiaomi_devauth

[Install]
WantedBy=multi-user.target
EOF
                arch-chroot /mnt systemctl enable sheng-devauth.service
              fi
              # Run post-install steps for sensors
              arch-chroot /mnt bash -c "udevadm control --reload || true; systemctl try-restart iio-sensor-proxy || true" || true
              rm -rf /mnt/tmp/pkgs
            '
          echo "✓ Custom packages installed"

      # ----------------------------------------------------------------
      # Finalize fstab and cleanup
      # ----------------------------------------------------------------
      - name: "Configure fstab"
        run: |
          PARTITION="${{ steps.partition.outputs.label }}"
          echo "PARTLABEL=$PARTITION / ext4 defaults 0 1" | sudo tee "$ROOTFS_MOUNT/etc/fstab"
          echo "✓ fstab configured"

      - name: "Clean up"
        run: |
          sudo docker run --rm --privileged \
            -v "$ROOTFS_MOUNT":/mnt \
            archlinux:latest \
            bash -c "arch-chroot /mnt pacman -Scc --noconfirm && rm -f /mnt/etc/resolv.conf" || true
          sudo umount "$ROOTFS_MOUNT/dev/pts" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/dev" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/proc" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/sys" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT" 2>/dev/null || true
          tune2fs -U ee8d3593-59b1-480e-a3b6-4fefb17ee7d8 rootfs.img || true
          echo "✓ Cleanup done"

      # ----------------------------------------------------------------
      # Boot image generation (unchanged)
      # ----------------------------------------------------------------
      - name: "[Custom] Generate boot.img"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          PARTITION="${{ steps.partition.outputs.label }}"
          CMDLINE="root=PARTLABEL=$PARTITION"
          if [[ "${{ steps.partition.outputs.quiet_boot_enabled }}" == "true" ]]; then
            CMDLINE="$CMDLINE quiet splash plymouth.ignore-serial-consoles fbcon=map:1"
          fi
          chmod +x mkbootimg
          ./mkbootimg \
            --kernel Image.gz-dtb_sheng \
            --cmdline "$CMDLINE" \
            --base 0x00000000 \
            --kernel_offset 0x00008000 \
            --tags_offset 0x01e00000 \
            --pagesize 4096 \
            --id \
            -o boot.img
          echo "✓ boot.img generated"

      # ----------------------------------------------------------------
      # Upload final artifacts
      # ----------------------------------------------------------------
      - name: "Upload RootFS Image"
        uses: actions/upload-artifact@v7
        with:
          name: arch-rootfs-${{ inputs.desktop }}-${{ steps.partition.outputs.label }}
          path: rootfs.img
          retention-days: 14
          if-no-files-found: error
          compression-level: 1

      - name: "Upload Boot Image"
        uses: actions/upload-artifact@v7
        with:
          name: arch-boot-${{ inputs.desktop }}-${{ steps.partition.outputs.label }}
          path: boot.img
          retention-days: 14
          if-no-files-found: warn
          compression-level: 1
